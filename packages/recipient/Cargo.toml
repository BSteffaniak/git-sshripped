[package]
authors = { workspace = true }
categories = ["command-line-utilities", "development-tools"]
description = "Recipient domain for git-sshripped"
edition = { workspace = true }
keywords = ["crypt", "git", "recipient", "ssh"]
license = { workspace = true }
name = "git_sshripped_recipient"
readme = "README.md"
repository = { workspace = true }
version = { workspace = true }

[dependencies]
git_sshripped_recipient_models = { workspace = true }
age = { workspace = true }
anyhow = { workspace = true, features = ["std"] }
base64 = { workspace = true, features = ["std"] }
profiling = { workspace = true }
reqwest = { workspace = true, features = ["blocking", "rustls-tls"] }
serde_json = { workspace = true, features = ["std"] }
sha2 = { workspace = true }
toml = { workspace = true, features = ["display", "parse"] }

[features]
default = []
fail-on-warnings = ["git_sshripped_recipient_models/fail-on-warnings"]
